<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <defs>
    <linearGradient id="oliveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8C8A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A9A7A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Branche d'olivier stylisée -->
  <g transform="translate(15, 20)">
    <!-- Tige principale -->
    <path d="M5 30 Q25 25 50 20" stroke="#5A7A5A" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Feuilles d'olivier -->
    <ellipse cx="15" cy="22" rx="8" ry="3" fill="url(#oliveGrad)" transform="rotate(-25 15 22)"/>
    <ellipse cx="25" cy="32" rx="9" ry="3.5" fill="url(#oliveGrad)" transform="rotate(20 25 32)"/>
    <ellipse cx="35" cy="18" rx="9" ry="3.5" fill="url(#oliveGrad)" transform="rotate(-20 35 18)"/>
    <ellipse cx="45" cy="28" rx="8" ry="3" fill="url(#oliveGrad)" transform="rotate(15 45 28)"/>
    
    <!-- Olive (point digital) -->
    <circle cx="52" cy="18" r="3.5" fill="#5A4A7A"/>
    <circle cx="52" cy="18" r="1.5" fill="#C8B8E0"/>
  </g>
  
  <!-- Texte Meditora -->
  <text x="90" y="48" font-family="Georgia, 'Playfair Display', serif" font-size="34" font-weight="600" fill="#5A4A7A" font-style="italic">
    Meditora
  </text>
  
  <!-- Texte Digital -->
  <text x="92" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#7A9A7A" letter-spacing="5">
    D I G I T A L
  </text>
</svg>
